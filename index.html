<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Please Wait</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f172a;
        font-family: Arial, sans-serif;
        color: #e5e7eb;
    }

    .container {
        text-align: center;
    }

    /* Track */
    .track {
        width: 200px;
        height: 6px;
        background: #1e293b;
        border-radius: 10px;
        position: relative;
        margin: 30px auto;
        overflow: hidden;
    }

    /* Ball */
    .ball {
        width: 20px;
        height: 20px;
        background: #38bdf8;
        border-radius: 50%;
        position: absolute;
        top: -7px;
        animation: roll 1.5s infinite ease-in-out;
    }

    @keyframes roll {
        0%   { left: 0; }
        50%  { left: 180px; }
        100% { left: 0; }
    }

    h1 {
        font-size: 22px;
        margin-bottom: 10px;
    }

    p {
        font-size: 14px;
        color: #94a3b8;
    }

    .hint {
        margin-top: 15px;
        font-size: 13px;
        color: #64748b;
        font-style: italic;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Please wait...</h1>

    <div class="track">
        <div class="ball"></div>
    </div>

    <p>File is updating...</p>

    <div class="hint">
        If this takes too long, refresh this page in an hour.
    </div>
</div>

</body>
</html>
